applications:
  argocd:
    enabled: true
    name: argocd
    namespace: argocd
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/argo-cd
      helm:
        valueFiles:
          - argocd2-values.yaml
  argo-applications:
    enabled: true
    name: argo-applications
    namespace: argocd
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/argo-applications
      helm:
        valueFiles:
          - argocd2-sequential-values.yaml
  k8s-resources:
    enabled: true
    name: k8s-resources
    namespace: argocd
    annotations:
      argocd.argoproj.io/sync-wave: "-1"
    destination:
      namespace: kube-rca
    source:
      repoURL: https://github.com/kube-rca/k8s-resources.git
      targetRevision: main
      path: external-secrets
      directory:
        recurse: true
  external-secrets:
    enabled: true
    name: external-secrets
    namespace: argocd
    annotations:
      argocd.argoproj.io/sync-wave: "-2"
    destination:
      namespace: external-secrets
    source:
      repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.2.0
      helm:
        values: |
          installCRDs: true
          crds:
            unsafeServeV1Beta1: true
  cert-manager:
    enabled: true
    name: cert-manager
    namespace: argocd
    annotations:
      argocd.argoproj.io/sync-wave: "-4"
    destination:
      namespace: cert-manager
    source:
      repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.20.1
      helm:
        values: |
          installCRDs: true
  cert-manager-issuer:
    enabled: true
    name: cert-manager-issuer
    namespace: argocd
    annotations:
      argocd.argoproj.io/sync-wave: "-3"
    destination:
      namespace: cert-manager
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/cert-manager-issuer
  ingress-nginx:
    enabled: true
    name: ingress-nginx
    namespace: argocd
    destination:
      namespace: ingress-nginx
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/ingress-nginx
      helm:
        valueFiles:
          - argocd2-values.yaml
  kube-rca:
    enabled: true
    name: kube-rca
    namespace: argocd
    destination:
      namespace: kube-rca
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/kube-rca
      helm:
        valueFiles:
          - argocd2-gp2-values.yaml
  kube-prometheus-stack:
    enabled: true
    name: kube-prometheus-stack
    namespace: argocd
    destination:
      namespace: monitoring
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/kube-prometheus-stack
      helm:
        valueFiles:
          - kube-rca-values.yaml
  alloy:
    enabled: true
    name: alloy
    namespace: argocd
    destination:
      namespace: monitoring
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/alloy
      helm:
        valueFiles:
          - kube-rca-values.yaml
  loki:
    enabled: true
    name: loki
    namespace: argocd
    destination:
      namespace: monitoring
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/loki
      helm:
        valueFiles:
          - argocd2-gp2-values.yaml
  tempo:
    enabled: true
    name: tempo
    namespace: argocd
    destination:
      namespace: monitoring
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/tempo
      helm:
        valueFiles:
          - kube-rca-values.yaml
  chaos-mesh:
    enabled: true
    name: chaos-mesh
    namespace: argocd
    destination:
      namespace: chaos-mesh
    ignoreDifferences:
      - group: admissionregistration.k8s.io
        kind: MutatingWebhookConfiguration
        name: chaos-mesh-mutation
        jqPathExpressions:
          - .webhooks[].clientConfig.caBundle
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        name: chaos-mesh-validation
        jqPathExpressions:
          - .webhooks[].clientConfig.caBundle
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        name: chaos-mesh-validation-auth
        jqPathExpressions:
          - .webhooks[].clientConfig.caBundle
      - kind: Secret
        name: chaos-mesh-webhook-certs
        jsonPointers:
          - /data
      - kind: Secret
        name: chaos-mesh-daemon-certs
        jsonPointers:
          - /data
      - kind: Secret
        name: chaos-mesh-daemon-client-certs
        jsonPointers:
          - /data
      - kind: Secret
        name: chaos-mesh-chaosd-client-certs
        jsonPointers:
          - /data
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/chaos-mesh
      helm:
        valueFiles:
          - kube-rca-values.yaml
  istio-base:
    enabled: true
    name: istio-base
    namespace: argocd
    destination:
      namespace: istio-system
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
    ignoreDifferences:
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        name: istiod-default-validator
        jsonPointers:
          - /webhooks/0/clientConfig/caBundle
          - /webhooks/0/failurePolicy
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/istio-base
      helm:
        valueFiles:
          - kube-rca-values.yaml
  istio-istiod:
    enabled: true
    name: istio-istiod
    namespace: argocd
    destination:
      namespace: istio-system
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/istio-istiod
      helm:
        valueFiles:
          - kube-rca-values.yaml
  kiali-operator:
    enabled: true
    name: kiali-operator
    namespace: argocd
    destination:
      namespace: kiali-operator
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/kiali-operator
      helm:
        valueFiles:
          - kube-rca-values.yaml
  bookinfo:
    enabled: true
    name: bookinfo
    namespace: argocd
    destination:
      namespace: bookinfo
    syncPolicy:
      managedNamespaceMetadata:
        labels:
          istio-injection: enabled
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/bookinfo
      helm:
        valueFiles:
          - kube-rca-values.yaml
  load-generator:
    enabled: true
    name: load-generator
    namespace: argocd
    destination:
      namespace: bookinfo
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true
        - ApplyOutOfSyncOnly=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: apps
        kind: Deployment
        name: load-generator
        jsonPointers:
          - /spec/replicas
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/load-generator
  grafana-dashboards:
    enabled: true
    name: grafana-dashboards
    namespace: argocd
    destination:
      namespace: bookinfo
    source:
      repoURL: https://github.com/kube-rca/helm-charts.git
      targetRevision: main
      path: charts/grafana-dashboards
