global:
  domain: argocd2.kkamji.net

configs:
  params:
    server.insecure: "true"

redis-ha:
  enabled: false

server:
  service:
    type: ClusterIP
  ingress:
    enabled: true
    controller: aws
    ingressClassName: alb
    hostname: argocd2.kkamji.net
    annotations:
      alb.ingress.kubernetes.io/backend-protocol: HTTP
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:376129852049:certificate/df267f48-3e42-4eb5-b705-9948fe538b6e
      alb.ingress.kubernetes.io/group.name: kkamji-public
      alb.ingress.kubernetes.io/group.order: "20"
      alb.ingress.kubernetes.io/healthcheck-path: /healthz
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/target-type: ip
      external-dns.alpha.kubernetes.io/hostname: argocd2.kkamji.net
    aws:
      serviceType: ClusterIP
