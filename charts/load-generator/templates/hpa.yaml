{{- if .Values.autoscaling.enabled }}
{{- $_ := required ".Values.resources.requests.cpu is required when autoscaling is enabled." .Values.resources.requests.cpu }}
{{- $cpuTarget := required ".Values.autoscaling.targetCPUUtilizationPercentage is required when autoscaling is enabled." .Values.autoscaling.targetCPUUtilizationPercentage }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "load-generator.fullname" . }}
  labels:
    {{- include "load-generator.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "load-generator.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $cpuTarget }}
{{- end }}
